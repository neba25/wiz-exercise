# Create this via kubectl instead of committing real credentials, e.g.:
#
# kubectl create secret generic mongo-connection \
#   --namespace wiz-exercise \
#   --from-literal=MONGO_URI="mongodb://appuser:<password>@<mongo-private-ip>:27017/todoapp?authSource=todoapp"
#
# This file is a template/reference only.
apiVersion: v1
kind: Secret
metadata:
  name: mongo-connection
  namespace: wiz-exercise
type: Opaque
stringData:
  MONGO_URI: "mongodb://appuser:REPLACE_ME@REPLACE_WITH_MONGO_PRIVATE_IP:27017/todoapp?authSource=todoapp"
